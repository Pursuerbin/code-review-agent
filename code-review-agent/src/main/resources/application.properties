# MySQL 主数据源
spring.datasource.url=jdbc:mysql://localhost:3306/code_review?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# PostgreSQL 向量数据源
spring.vector-datasource.url=jdbc:postgresql://localhost:5432/knowledge_db
spring.vector-datasource.username=postgres
spring.vector-datasource.password=123456
spring.vector-datasource.driver-class-name=org.postgresql.Driver
spring.vector-datasource.hikari.connection-timeout=30000
spring.vector-datasource.hikari.maximum-pool-size=5

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# AI 阿里百炼
spring.ai.openai.api-key=sk-3bb568ebffcb4a649ff267da81dbab97
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
spring.ai.openai.chat.options.model=qwen-turbo
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=text-embedding-v2

# MyBatis-Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# 日志
logging.level.com.agent.codereview=DEBUG
